{% load static %}

<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Система управління завданнями</title>
<!--    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">-->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link href="{% static 'css/main.css' %}" rel="stylesheet">
</head>
<body>
    <nav class="navbar d-flex justify-content-center gap-4 pt-4 pb-3">
        <a class="navbar-brand fw-bold" href="{% url 'tasks:task-list' %}" style="font-size: 1.5rem; color: #1a1a1a;">Головна</a>
        {% if user.is_authenticated %}
            <form action="{% url 'tasks:logout' %}" method="post" class="m-0">
                {% csrf_token %}
                <button type="submit" class="btn btn-outline-danger fw-bold">Вихід</button>
            </form>
        {% else %}
            <a class="navbar-brand" href="{% url 'tasks:login' %}">Вхід</a>
            <a class="navbar-brand" href="{% url 'tasks:register' %}">Реєстрація</a>
        {% endif %}
    </nav>

    {% block content %}
    {% endblock %}
</body>
</html>
