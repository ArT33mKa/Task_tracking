{% extends 'base.html' %}

{% block content %}
<div class="container d-flex justify-content-center align-items-center" style="min-height: 75vh; box-shadow: none; background: transparent;">
    <div class="p-5" style="background-color: rgba(255, 255, 255, 0.85); border-radius: 15px; box-shadow: 0 8px 32px rgba(0,0,0,0.1); width: 100%; max-width: 450px;">
        <h2 class="text-center mb-4 fw-bold" style="color: #2c3e50;">Вхід у систему</h2>

        <form method="post">
            {% csrf_token %}

            <!-- Проходимось циклом по полях форми, щоб вивести їх красиво -->
            {% for field in form %}
                <div class="mb-3">
                    <label class="form-label fw-bold" style="color: #3b5998;">{{ field.label }}</label>
                    {{ field }}
                    {% if field.errors %}
                        <div class="text-danger small mt-1">{{ field.errors|striptags }}</div>
                    {% endif %}
                </div>
            {% endfor %}

            <button type="submit" class="btn btn-primary w-100 mt-4 fs-5" style="border-radius: 25px;">Увійти</button>
        </form>

        <div class="text-center mt-3">
            <small>Немає акаунту? <a href="{% url 'tasks:register' %}" style="color: #0d6efd; text-decoration: none; font-weight: bold;">Зареєструватися</a></small>
        </div>
    </div>
</div>
{% endblock %}
